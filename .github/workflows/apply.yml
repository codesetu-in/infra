name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
      - "*.tf"

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  # ── Staging (auto-approve on merge) ──────────────────────────────────────────
  apply-staging:
    name: Apply / staging
    runs-on: ubuntu-latest
    environment: staging
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      WORKING_DIR: environments/staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (staging)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          use-oidc: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.12"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -no-color
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color
        working-directory: ${{ env.WORKING_DIR }}

  # ── Production (manual approval gate via GitHub environment) ─────────────────
  apply-production:
    name: Apply / production
    runs-on: ubuntu-latest
    environment: production
    needs: [apply-staging]
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      WORKING_DIR: environments/production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (production)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          use-oidc: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.12"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -no-color
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Plan (confirmation step)
        run: terraform plan -no-color -detailed-exitcode
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color
        working-directory: ${{ env.WORKING_DIR }}
