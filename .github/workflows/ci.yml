name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - name: Terraform fmt check
        run: terraform fmt -check -recursive .
      - name: Terraform validate
        run: |
          for env in environments/dev environments/staging environments/prod; do
            (cd "$env" && terraform init -backend=false && terraform validate)
          done
